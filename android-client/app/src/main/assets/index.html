<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SyncStation - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ba1a1a",
                      "surface-container-lowest": "#ffffff",
                      "primary": "#00459a",
                      "secondary-fixed": "#d6e3fb",
                      "on-tertiary": "#ffffff",
                      "inverse-surface": "#2e3132",
                      "surface-container": "#edeeef",
                      "on-surface": "#191c1d",
                      "on-tertiary-fixed": "#001f28",
                      "on-error": "#ffffff",
                      "primary-fixed": "#d8e2ff",
                      "surface-variant": "#e1e3e4",
                      "tertiary": "#005064",
                      "secondary-fixed-dim": "#bac7de",
                      "on-secondary-fixed": "#0f1c2d",
                      "inverse-on-surface": "#f0f1f2",
                      "on-primary": "#ffffff",
                      "on-primary-container": "#cfdcff",
                      "background": "#f8f9fa",
                      "surface": "#f8f9fa",
                      "on-primary-fixed": "#001a42",
                      "on-error-container": "#93000a",
                      "surface-container-low": "#f3f4f5",
                      "surface-dim": "#d9dadb",
                      "tertiary-container": "#006a83",
                      "outline-variant": "#c2c6d5",
                      "on-surface-variant": "#424753",
                      "on-primary-fixed-variant": "#004396",
                      "primary-fixed-dim": "#aec6ff",
                      "on-secondary-fixed-variant": "#3b485a",
                      "tertiary-fixed": "#b7eaff",
                      "surface-container-high": "#e7e8e9",
                      "on-secondary-container": "#586579",
                      "on-tertiary-fixed-variant": "#004e60",
                      "tertiary-fixed-dim": "#4cd6ff",
                      "on-tertiary-container": "#a5e6ff",
                      "on-background": "#191c1d",
                      "primary-container": "#005cc8",
                      "surface-bright": "#f8f9fa",
                      "on-secondary": "#ffffff",
                      "secondary": "#525f73",
                      "outline": "#727785",
                      "surface-tint": "#005ac4",
                      "surface-container-highest": "#e1e3e4",
                      "secondary-container": "#d6e3fb",
                      "inverse-primary": "#aec6ff",
                      "error-container": "#ffdad6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "sm": "8px",
                      "xl": "32px",
                      "lg": "24px",
                      "base": "8px",
                      "container-margin": "16px",
                      "xs": "4px",
                      "md": "16px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Inter"],
                      "display-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "headline-lg": ["Inter"],
                      "title-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "title-md": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
    <style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-sans">
    
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim full-width top-0 z-50 sticky shadow-sm">
    <div class="flex items-center justify-between px-container-margin py-base w-full max-w-screen-xl mx-auto hover:bg-surface-variant/20 dark:hover:bg-surface-variant/10">
        <div class="flex items-center gap-sm">
            <span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">sync_saved_locally</span>
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">SyncStation</h1>
        </div>
        <button id="syncStatusBtn" class="font-label-sm text-label-sm text-primary dark:text-primary-fixed-dim font-bold flex items-center gap-xs">
            <span>Sync</span>
        </button>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow px-container-margin py-lg max-w-screen-xl mx-auto w-full pb-24 md:pb-lg">
    <!-- Connection Status Bento Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-md mb-lg">
        
        <!-- Primary Status Card -->
        <div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] p-md flex flex-col justify-between border border-outline-variant/30">
            <div class="flex items-start justify-between mb-sm">
                <div>
                    <p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">Status Koneksi</p>
                    <h2 id="connectionStatus" class="font-title-md text-title-md text-on-surface">Mencari PC...</h2>
                </div>
                <div class="bg-primary-container/20 p-sm rounded-full flex items-center justify-center">
                    <span id="connectionIcon" class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">wifi_find</span>
                </div>
            </div>
            <div class="flex items-center gap-sm mt-md">
                <span class="material-symbols-outlined text-on-surface-variant">wifi</span>
                <span id="networkStatus" class="font-body-sm text-body-md text-on-surface-variant">Jaringan Lokal Aktif</span>
            </div>
        </div>

        <!-- Battery Status -->
        <div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] p-md flex items-center justify-between border border-outline-variant/30">
            <div>
                <p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">Baterai Laptop</p>
                <div class="flex items-baseline gap-sm">
                    <h2 id="batteryLevel" class="font-display-lg text-display-lg text-on-surface">--%</h2>
                    <span id="batteryState" class="font-body-md text-body-md text-primary">Unknown</span>
                </div>
            </div>
            <!-- Horizontal Laptop Battery Visual -->
            <div class="relative w-24 h-12 border-4 border-outline-variant rounded-lg flex items-center p-1">
                <div id="batteryFill" class="h-full bg-primary rounded-sm w-[0%] transition-all duration-500"></div>
                <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-2 h-4 bg-outline-variant rounded-r-sm"></div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <h3 class="font-title-md text-title-md text-on-surface mb-sm mt-lg">Tindakan Cepat</h3>
    <div class="grid grid-cols-2 gap-sm mb-lg">
        <button onclick="Android.sendLastPhoto()" class="bg-primary text-on-primary rounded-lg p-md flex flex-col items-center justify-center gap-sm shadow-[0_2px_8px_rgba(0,0,0,0.04)] hover:bg-primary-fixed-variant transition-colors min-h-[100px]">
            <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">photo_library</span>
            <span class="font-label-sm text-label-sm text-center">Kirim Foto Terakhir</span>
        </button>
        <button onclick="Android.sendClipboard()" class="bg-surface-container-lowest border border-primary text-primary rounded-lg p-md flex flex-col items-center justify-center gap-sm shadow-[0_2px_8px_rgba(0,0,0,0.04)] hover:bg-primary/5 transition-colors min-h-[100px]">
            <span class="material-symbols-outlined text-3xl">content_copy</span>
            <span class="font-label-sm text-label-sm text-center">Kirim Clipboard</span>
        </button>
    </div>

    <!-- Recent Activity Summary -->
    <h3 class="font-title-md text-title-md text-on-surface mb-sm mt-lg">Aktivitas Terakhir</h3>
    <div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-outline-variant/30 overflow-hidden">
        <ul id="activityList" class="divide-y divide-outline-variant/30">
            <!-- Activities will be injected here via JavaScript -->
            <li class="p-md flex items-center justify-between">
                <div class="flex items-center gap-md">
                    <div class="bg-secondary-container p-sm rounded-full text-on-secondary-container">
                        <span class="material-symbols-outlined">info</span>
                    </div>
                    <div>
                        <p class="font-body-md text-body-md text-on-surface font-medium">Belum ada aktivitas</p>
                        <p class="font-label-sm text-label-sm text-on-surface-variant">Menunggu koneksi...</p>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</main>

<!-- BottomNavBar -->
<nav class="bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed-dim fixed bottom-0 w-full z-50 h-20 shadow-[0_-2px_8px_rgba(0,0,0,0.04)] md:hidden">
    <div class="flex justify-around items-center px-4 w-full h-full">
        <button class="flex flex-col items-center justify-center font-label-sm text-label-sm bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary-fixed rounded-full px-5 py-1 scale-90 duration-200 ease-out">
            <span class="material-symbols-outlined mb-xs" style="font-variation-settings: 'FILL' 1;">dashboard</span>
            <span>Dashboard</span>
        </button>
        <button class="flex flex-col items-center justify-center font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:bg-surface-container-highest/50 transition-colors rounded-full px-5 py-1">
            <span class="material-symbols-outlined mb-xs">notifications</span>
            <span>Alerts</span>
        </button>
        <button class="flex flex-col items-center justify-center font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:bg-surface-container-highest/50 transition-colors rounded-full px-5 py-1">
            <span class="material-symbols-outlined mb-xs">folder_open</span>
            <span>Files</span>
        </button>
        <button class="flex flex-col items-center justify-center font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:bg-surface-container-highest/50 transition-colors rounded-full px-5 py-1">
            <span class="material-symbols-outlined mb-xs">settings</span>
            <span>Settings</span>
        </button>
    </div>
</nav>

<script>
    // Interface for Android to call
    function updateConnectionStatus(isConnected, ipAddress) {
        if (isConnected) {
            document.getElementById("connectionStatus").innerText = "Terhubung ke " + ipAddress;
            document.getElementById("connectionIcon").innerText = "check_circle";
            document.getElementById("connectionIcon").style.color = "#00459a"; // Primary
        } else {
            document.getElementById("connectionStatus").innerText = "Mencari PC...";
            document.getElementById("connectionIcon").innerText = "wifi_find";
            document.getElementById("connectionIcon").style.color = "#ba1a1a"; // Error
        }
    }

    function updateBattery(percentage, isCharging) {
        document.getElementById("batteryLevel").innerText = percentage + "%";
        document.getElementById("batteryState").innerText = isCharging ? "Charging" : "Discharging";
        document.getElementById("batteryFill").style.width = percentage + "%";
        
        // Color based on battery level
        if (percentage <= 20 && !isCharging) {
            document.getElementById("batteryFill").style.backgroundColor = "#ba1a1a";
        } else {
            document.getElementById("batteryFill").style.backgroundColor = "#00459a";
        }
    }

    function addActivity(icon, title, subtitle, statusIcon) {
        const list = document.getElementById("activityList");
        // Remove empty state if present
        if(list.children.length === 1 && list.innerText.includes("Belum ada aktivitas")) {
            list.innerHTML = "";
        }

        const li = document.createElement("li");
        li.className = "p-md flex items-center justify-between hover:bg-surface-container-low transition-colors";
        li.innerHTML = `
            <div class="flex items-center gap-md">
                <div class="bg-secondary-container p-sm rounded-full text-on-secondary-container">
                    <span class="material-symbols-outlined">${icon}</span>
                </div>
                <div>
                    <p class="font-body-md text-body-md text-on-surface font-medium">${title}</p>
                    <p class="font-label-sm text-label-sm text-on-surface-variant">${subtitle}</p>
                </div>
            </div>
            <span class="material-symbols-outlined text-primary text-sm">${statusIcon}</span>
        `;
        list.insertBefore(li, list.firstChild);
        
        if (list.children.length > 5) {
            list.removeChild(list.lastChild);
        }
    }
</script>
</body>
</html>
